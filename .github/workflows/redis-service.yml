name: Redis Service Test
on: push
jobs:
  test-redis:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - name: Install redis-tools
        run: sudo apt-get update && sudo apt-get install -y redis-tools
      - name: Test Redis connection
        run: |
          redis-cli -h redis ping
          redis-cli -h redis set testkey "hello from localrunner"
          result=$(redis-cli -h redis get testkey)
          echo "Got: $result"
          if [ "$result" = "hello from localrunner" ]; then
            echo "Redis service works!"
          else
            echo "Redis test failed"
            exit 1
          fi

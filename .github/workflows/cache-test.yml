name: Cache Test
on: push
jobs:
  test-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug env
        run: |
          echo "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL"
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN:+SET}"
          env | sort > /tmp/debug-env.txt
          cat /tmp/debug-env.txt

      - name: Create test file
        run: |
          mkdir -p /tmp/test-cache-dir
          echo "hello cache" > /tmp/test-cache-dir/test.txt

      - name: Save cache
        uses: actions/cache/save@v4
        with:
          path: /tmp/test-cache-dir
          key: test-cache-key-v1

      - name: Remove cached dir
        run: rm -rf /tmp/test-cache-dir

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/test-cache-dir
          key: test-cache-key-v1

      - name: Verify cache restored
        run: |
          cat /tmp/test-cache-dir/test.txt 2>&1 || echo "File not found"
          test -f /tmp/test-cache-dir/test.txt && echo "SUCCESS" || exit 1

name: Cache Test
on: push
jobs:
  test-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug env
        run: |
          echo "ACTIONS_CACHE_URL=$ACTIONS_CACHE_URL"
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN:+SET}"
          echo "ACTIONS_RUNTIME_URL=$ACTIONS_RUNTIME_URL"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL=$ACTIONS_ID_TOKEN_REQUEST_URL"
          env | grep -i cache || true
          env | grep -i actions || true

      - name: Create test file
        run: |
          mkdir -p /tmp/test-cache-dir
          echo "hello cache" > /tmp/test-cache-dir/test.txt
          cat /tmp/test-cache-dir/test.txt

      - name: Save cache
        uses: actions/cache/save@v4
        with:
          path: /tmp/test-cache-dir
          key: test-cache-key-${{ github.sha }}

      - name: Remove cached dir
        run: rm -rf /tmp/test-cache-dir

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/test-cache-dir
          key: test-cache-key-${{ github.sha }}

      - name: Verify cache restored
        run: |
          ls -la /tmp/test-cache-dir/ || echo "Directory not found"
          cat /tmp/test-cache-dir/test.txt || echo "File not found"
          test -f /tmp/test-cache-dir/test.txt && echo "Cache restored successfully!" || exit 1
